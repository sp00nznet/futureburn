# ============================================================================
#  futureburn — GitLab CI/CD  (buildforever.cloud)
# ============================================================================
#  futureburn is a Windows-only .NET 8 application — WPF, IMAPI COM interop, and
#  the 32-bit LightScribe SDK. None of that builds on Linux, so every job here
#  MUST run on a Windows runner. A Linux runner cannot compile this project.
#
#  ── One-time runner setup (on the GitLab server side) ──────────────────────
#   1. A Windows 10/11 or Windows Server machine.
#   2. Install the .NET 8 SDK MACHINE-WIDE — a per-user install puts dotnet on
#      *your* PATH but not on the gitlab-runner service account's PATH:
#        winget install Microsoft.DotNet.SDK.8 --scope machine
#      (or grab the installer from https://dotnet.microsoft.com/download —
#       it lands in C:\Program Files\dotnet and updates the system PATH.
#       For a Proxmox-hosted runner there is a script that does this end-to-end:
#       scripts/install_dotnet8_windows_runner.py)
#   3. Restart the runner so the new PATH takes effect in the service:
#        Restart-Service gitlab-runner
#   4. Install gitlab-runner and register it with the shell executor:
#        gitlab-runner register --url https://buildforever.cloud/ `
#          --executor shell --shell pwsh
#   5. Tag that runner `windows`, `win10`, `shell` (in the runner's settings
#      on GitLab) so the jobs below land on it.
#
#  Until a runner carrying all three tags exists, pipelines stay "pending" —
#  that's expected, not a failure.
# ============================================================================

stages:
  - build
  - test
  - publish
  - deploy

variables:
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  DOTNET_NOLOGO: "1"
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "1"
  # The two executables are x86 (the LightScribe SDK is 32-bit only).
  RUNTIME: "win-x86"

# Every job runs on the Windows runner.
# Multiple tags are ANDed — the runner must carry all three.
default:
  tags:
    - windows
    - win10
    - shell

# ── build ───────────────────────────────────────────────────────────────────
# Does the whole solution still compile? Core (AnyCPU) + Cli + Gui (x86).
build:
  stage: build
  script:
    - dotnet --info
    - dotnet restore Futureburn.sln
    - dotnet build Futureburn.sln -c Release --no-restore

# ── test ────────────────────────────────────────────────────────────────────
# Run the xUnit suite in tests/Futureburn.Core.Tests.
test:
  stage: test
  script:
    - dotnet test tests/Futureburn.Core.Tests/Futureburn.Core.Tests.csproj -c Release --logger "trx;LogFileName=futureburn-tests.trx" --results-directory test-results
  artifacts:
    when: always
    paths:
      - test-results/
    expire_in: 1 week
  # To get the GitLab merge-request test-report widget, add the
  # JunitXml.TestLogger package to the test project and swap the logger to
  #   --logger "junit;LogFilePath=test-results/futureburn-tests.xml"
  # then add:  reports: { junit: test-results/futureburn-tests.xml }

# ── publish ─────────────────────────────────────────────────────────────────
# Two self-contained, SINGLE-FILE x86 builds — the entire .NET runtime, every
# managed and native dependency, all bundled into one .exe per project.
# Download, double-click, done — no installer, no separate runtime, no folder
# of DLLs. True to the "no installers" spirit of the project.

# The "cmd" build — the Futureburn.Cli command-line tool, one .exe.
publish:cli:
  stage: publish
  script:
    - dotnet publish src/Futureburn.Cli/Futureburn.Cli.csproj -c Release -r $RUNTIME --self-contained true -p:PublishSingleFile=true -o publish/cli
  artifacts:
    name: "futureburn-cli-$CI_COMMIT_SHORT_SHA"
    paths:
      - publish/cli/Futureburn.Cli.exe
    expire_in: 30 days

# The "windows" build — the Futureburn.Gui WPF application, one .exe.
publish:gui:
  stage: publish
  script:
    - dotnet publish src/Futureburn.Gui/Futureburn.Gui.csproj -c Release -r $RUNTIME --self-contained true -p:PublishSingleFile=true -o publish/gui
  artifacts:
    name: "futureburn-gui-$CI_COMMIT_SHORT_SHA"
    paths:
      - publish/gui/Futureburn.Gui.exe
    expire_in: 30 days

# ── deploy ──────────────────────────────────────────────────────────────────
# Drop both .exe artifacts onto /mnt/releases on the GitLab server (the same
# share connectty publishes to). Laid out as <repo>/<ref>/ — so:
#     /mnt/releases/futureburn/main/Futureburn.Cli.exe
#     /mnt/releases/futureburn/main/Futureburn.Gui.exe
# Every push to main updates the main/ slot in place; any future git tag would
# land in its own subdir (e.g. /mnt/releases/futureburn/v0.0.55/).
#
# The Windows side of that mount is exposed via SMB as \\192.168.100.22\releases.
deploy:windows:
  stage: deploy
  needs:
    - publish:cli
    - publish:gui
  script:
    - 'net use R: \\192.168.100.22\releases gitlab /user:root'
    - 'New-Item -ItemType Directory -Force -Path "R:\$env:CI_PROJECT_NAME\$env:CI_COMMIT_REF_NAME"'
    - 'Copy-Item -Force publish\cli\Futureburn.Cli.exe "R:\$env:CI_PROJECT_NAME\$env:CI_COMMIT_REF_NAME\"'
    - 'Copy-Item -Force publish\gui\Futureburn.Gui.exe "R:\$env:CI_PROJECT_NAME\$env:CI_COMMIT_REF_NAME\"'
    - 'net use R: /delete'
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_PIPELINE_SOURCE == "web"
    - if: $CI_COMMIT_BRANCH == "main"
